services:
  backend:
    build: ./backend
    container_name: studywise-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env

  frontend:
    build: .
    container_name: studywise-frontend
    ports:
      - "8080:8080"
    environment:
      VITE_API_URL: http://backend:5000/api
    depends_on:
      - backend